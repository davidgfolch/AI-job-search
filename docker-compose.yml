# Docker Compose for AI Job Search - Development Mode
# Use root/rootPass as user/password credentials

services:
  # MySQL Database
  mysql_db:
    image: mysql:9 # MySQL 9 to match existing data version
    container_name: ai-job-search-mysql
    volumes:
      - /var/lib/mysql:/var/lib/mysql # Original bind mount to preserve existing data
      - ./scripts/mysql:/docker-entrypoint-initdb.d
    command: --log_timestamps=SYSTEM
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootPass
      MYSQL_DATABASE: jobs
      MYSQL_USER: user
      MYSQL_PASSWORD: userPass
      TZ: ${GLOBAL_TZ}
    ports:
      - "3306:3306"
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      timeout: 20s
      retries: 10
      interval: 10s
    networks:
      - ai-job-search

  # Backend - FastAPI REST API
  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: ai-job-search-backend
    volumes:
      - ./apps/backend:/app/apps/backend
      - ./apps/commonlib:/app/apps/commonlib
      - ./apps/scrapper:/app/apps/scrapper
      - ./scripts:/app/scripts
      - ./.env:/app/.env
      - ./.env.secrets:/app/.env.secrets
      - ./data/metrics:/app/data/metrics
      - ./apps/aiEnrich/data/logs:/logs/aienrich:ro
      - ./apps/aiEnrich3/data/logs:/logs/aienrich3:ro
      - ./apps/aiEnrichNew/data/logs:/logs/aienrichnew:ro
      - ./apps/aiEnrichSkill/data/logs:/logs/aienrichskill:ro
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - COMMONLIB_DB_HOST=mysql_db # MySQL service name for Docker networking
      - MONGO_URI=mongodb://${MONGO_USERNAME:-root}:${MONGO_PASSWORD:-rootPass}@mongo_db:27017/
      - TZ=${GLOBAL_TZ}
      - AI_ENRICH_METRICS_FILE=/app/data/metrics/enrichment_metrics.json
    depends_on:
      mysql_db:
        condition: service_healthy
      mongo_db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - ai-job-search
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3

  # Web - React/Vite Frontend
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: ai-job-search-web
    volumes:
      - ./apps/web:/app
      - /app/node_modules # Anonymous volume for node_modules
      - ./.env:/workspace/.env # Mount .env at workspace level
      - ./.env.secrets:/workspace/.env.secrets
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000
      - TZ=${GLOBAL_TZ}
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - ai-job-search

  # Ollama - LLM Service for AI Enrichment
  ollama:
    image: ollama/ollama:latest
    container_name: ai-job-search-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ${OLLAMA_MODELS_PATH:-~/.ollama}:/root/.ollama # Ollama models from host (set OLLAMA_MODELS_PATH in .env for Windows)
    healthcheck:
      test: [ "CMD", "ollama", "list" ]
      interval: 1m30s
      timeout: 10s
      retries: 3
    networks:
      - ai-job-search

  # AI Enrichment
  aienrich:
    build:
      context: .
      dockerfile: apps/aiEnrich/Dockerfile
    container_name: ai-job-search-aienrich
    profiles:
      - aienrich
    volumes:
      - ./apps/aiEnrich:/app/apps/aiEnrich
      - /app/apps/aiEnrich/.venv # Anonymous volume to isolate container venv from host
      - ./apps/commonlib:/app/apps/commonlib
      - ./.env:/app/.env
      - ./.env.secrets:/app/.env.secrets
      - ./data/metrics:/app/data/metrics
    environment:
      - PYTHONUNBUFFERED=1
      - COMMONLIB_DB_HOST=mysql_db
      - TZ=${GLOBAL_TZ}
      - AI_ENRICH_OLLAMA_BASE_URL=http://ollama:11434
      - AI_ENRICH_METRICS_FILE=/app/data/metrics/enrichment_metrics.json
    depends_on:
      mysql_db:
        condition: service_healthy
      ollama:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - ai-job-search

  # AI Enrichment New - Hugging Face Local Models
  aienrichnew:
    build:
      context: .
      dockerfile: apps/aiEnrichNew/Dockerfile
    container_name: ai-job-search-aienrichnew
    profiles:
      - aiEnrichNew
    volumes:
      - ./apps/aiEnrichNew:/app/apps/aiEnrichNew
      - /app/apps/aiEnrichNew/.venv # Anonymous volume to isolate container venv from host
      - ./apps/commonlib:/app/apps/commonlib
      - ./.env:/app/.env
      - ./.env.secrets:/app/.env.secrets
      - ${HF_HOME:-~/.cache/huggingface}:/root/.cache/huggingface # Persist HF models (set HF_HOME in .env if needed)
      - ./data/metrics:/app/data/metrics
    environment:
      - PYTHONUNBUFFERED=1
      - COMMONLIB_DB_HOST=mysql_db # MySQL service name for Docker networking
      - TZ=${GLOBAL_TZ}
      - AI_ENRICH_METRICS_FILE=/app/data/metrics/enrichment_metrics.json
    depends_on:
      mysql_db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - ai-job-search

  # AI Skill Enrichment - Decoupled skill enrichment (Ollama / HuggingFace)
  aienrichskill:
    build:
      context: .
      dockerfile: apps/aiEnrichSkill/Dockerfile
    container_name: ai-job-search-aienrichskill
    profiles:
      - aiEnrichSkill
    volumes:
      - ./apps/aiEnrichSkill:/app/apps/aiEnrichSkill
      - /app/apps/aiEnrichSkill/.venv
      - ./apps/commonlib:/app/apps/commonlib
      - ./.env:/app/.env
      - ./.env.secrets:/app/.env.secrets
      - ${HF_HOME:-~/.cache/huggingface}:/root/.cache/huggingface
      - ./data/metrics:/app/data/metrics
    environment:
      - PYTHONUNBUFFERED=1
      - COMMONLIB_DB_HOST=mysql_db
      - TZ=${GLOBAL_TZ}
      - AI_ENRICHSKILL_OLLAMA_BASE_URL=http://ollama:11434
      - AI_ENRICH_METRICS_FILE=/app/data/metrics/enrichment_metrics.json
    depends_on:
      mysql_db:
        condition: service_healthy
      ollama:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - ai-job-search

  # AI CV Matcher - Local CV Matching extracted from AiEnrichNew
  aicvmatcher:
    build:
      context: .
      dockerfile: apps/aiCvMatcher/Dockerfile
    container_name: ai-job-search-aicvmatcher
    volumes:
      - ./apps/aiCvMatcher:/app/apps/aiCvMatcher
      - /app/apps/aiCvMatcher/.venv # Anonymous volume to isolate container venv from host
      - ./apps/commonlib:/app/apps/commonlib
      - ./.env:/app/.env
      - ./.env.secrets:/app/.env.secrets
      - ${HF_HOME:-~/.cache/huggingface}:/root/.cache/huggingface # Persist HF models
    environment:
      - PYTHONUNBUFFERED=1
      - COMMONLIB_DB_HOST=mysql_db
      - TZ=${GLOBAL_TZ}
    depends_on:
      mysql_db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - ai-job-search

  # AI Enrichment 3 - Fast CPU Evaluators (mDeBERTa + GLiNER)
  aienrich3:
    build:
      context: .
      dockerfile: apps/aiEnrich3/Dockerfile
    container_name: ai-job-search-aienrich3
    profiles:
      - aiEnrich3
    volumes:
      - ./apps/aiEnrich3:/app/apps/aiEnrich3
      - /app/apps/aiEnrich3/.venv # Anonymous volume to isolate container venv from host
      - ./apps/commonlib:/app/apps/commonlib
      - ./.env:/app/.env
      - ./.env.secrets:/app/.env.secrets
      - ${HF_HOME:-~/.cache/huggingface}:/root/.cache/huggingface # Persist HF models
      - ./data/metrics:/app/data/metrics
    environment:
      - PYTHONUNBUFFERED=1
      - COMMONLIB_DB_HOST=mysql_db
      - TZ=${GLOBAL_TZ}
      - AI_ENRICH_METRICS_FILE=/app/data/metrics/enrichment_metrics.json
    depends_on:
      mysql_db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - ai-job-search

  # AI Form Filler - AI-powered job application form answerer
  aiformfiller:
    build:
      context: .
      dockerfile: apps/aiFormFiller/Dockerfile
    container_name: ai-job-search-aiformfiller
    volumes:
      - ./apps/aiFormFiller:/app/apps/aiFormFiller
      - /app/apps/aiFormFiller/.venv
      - ./apps/commonlib:/app/apps/commonlib
      - ./.env:/app/.env
      - ./.env.secrets:/app/.env.secrets
      - ${HF_HOME:-~/.cache/huggingface}:/root/.cache/huggingface
    environment:
      - PYTHONUNBUFFERED=1
      - TZ=${GLOBAL_TZ}
    ports:
      - "8080:8080"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/api/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - ai-job-search

  # MongoDB - Salary History & future concerns
  mongo_db:
    image: mongo:7
    command: ['--quiet']
    container_name: ai-job-search-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USERNAME:-root}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-rootPass}
      MONGO_INITDB_DATABASE: ${MONGO_DATABASE:-jobs}
      TZ: ${GLOBAL_TZ}
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
      - ./scripts/mongo:/docker-entrypoint-initdb.d
    networks:
      - ai-job-search
    healthcheck:
      test: echo 'db.runCommand("ping.ok").ok' | mongosh --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # Cron - Scheduled background jobs (always running)
  cron:
    build:
      context: .
      dockerfile: apps/cron/Dockerfile
    container_name: ai-job-search-cron
    volumes:
      - ./apps/cron:/app/apps/cron
      - /app/apps/cron/.venv # Anonymous volume to isolate container venv from host
      - ./apps/commonlib:/app/apps/commonlib
      - ./.env:/app/.env
      - ./.env.secrets:/app/.env.secrets
    environment:
      - PYTHONUNBUFFERED=1
      - COMMONLIB_DB_HOST=mysql_db
      - MONGO_URI=mongodb://${MONGO_USERNAME:-root}:${MONGO_PASSWORD:-rootPass}@mongo_db:27017/
      - TZ=${GLOBAL_TZ}
    depends_on:
      mysql_db:
        condition: service_healthy
      mongo_db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - ai-job-search

  # Scrapper - Job Scraping Service
  scrapper:
    build:
      context: .
      dockerfile: apps/scrapper/Dockerfile
    container_name: ai-job-search-scrapper
    volumes:
      - ./apps/scrapper:/app/apps/scrapper
      - ./apps/commonlib:/app/apps/commonlib
      - ./.env:/app/.env
      - ./.env.secrets:/app/.env.secrets
    environment:
      - PYTHONUNBUFFERED=1
      - COMMONLIB_DB_HOST=mysql_db
      - TZ=${GLOBAL_TZ}
      - AI_ENRICHSKILL_OLLAMA_BASE_URL=http://ollama:11434
    depends_on:
      mysql_db:
        condition: service_healthy
      ollama:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - ai-job-search
    profiles:
      - scrapper # Optional service, enable with --profile scrapper
    # Note: Scrapper runs as a batch job, not a long-running service
    # Use: docker-compose run scrapper to execute manually

  # Prometheus - Metrics Collection
  prometheus:
    image: prom/prometheus:latest
    container_name: ai-job-search-prometheus
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    restart: unless-stopped
    networks:
      - ai-job-search
    depends_on:
      backend:
        condition: service_healthy

  # Grafana - Metrics Visualization
  grafana:
    image: grafana/grafana:latest
    container_name: ai-job-search-grafana
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/datasources:/etc/grafana/provisioning/datasources
      - ./docker/grafana/dashboards:/etc/grafana/provisioning/dashboards
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - ai-job-search

networks:
  ai-job-search:
    driver: bridge

volumes:
  mysql_data:
    driver: local
  mongo_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
